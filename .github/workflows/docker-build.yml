# .github/workflows/docker-build.yml
#
# GitHub Actions Workflow: Build & Push Docker Image
# ────────────────────────────────────────────────────
# This workflow automatically builds a Docker image and pushes it to Docker Hub
# every time code is pushed to the "main" branch.
#
# Required GitHub Secrets (set in: Settings → Secrets → Actions):
#   DOCKER_USERNAME  — Your Docker Hub username
#   DOCKER_PASSWORD  — Your Docker Hub password or access token

name: Build and Push Docker Image

# ── Trigger ──────────────────────────────────────────────────────────────────
# Run this workflow whenever code is pushed to the main branch.
on:
  push:
    branches:
      - main

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  build-and-push:
    # Run on the latest version of Ubuntu (GitHub-hosted runner)
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Check out the repository code ──────────────────────────────
      # This downloads your project files onto the runner machine.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Log in to Docker Hub ───────────────────────────────────────
      # Uses your DOCKER_USERNAME and DOCKER_PASSWORD secrets stored in GitHub.
      # Never hardcode your credentials in the workflow file!
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Step 3: Set up Docker Buildx ───────────────────────────────────────
      # Buildx enables advanced build features like layer caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 4: Build and push the Docker image ─────────────────────────────
      # Builds the image from the Dockerfile in the repo root, then pushes
      # it to Docker Hub using the tag: <username>/spam-detector:latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Image is tagged as:  dockerhub-username/spam-detector:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/spam-detector:latest
          # Cache layers to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
