# GitHub Actions Workflow: Build & Push Docker Image
name: Build and Push Docker Image

# Run this workflow whenever code is pushed to the main branch.
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    # Run on the latest version of Ubuntu (GitHub-hosted runner)
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Check out the repository code
      # This downloads your project files onto the runner machine.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 4: Build and push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Image is tagged as:  dockerhub-username/spam-detector:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/spam-detector:latest
          # Cache layers to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
